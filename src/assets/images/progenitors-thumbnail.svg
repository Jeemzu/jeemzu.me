<svg xmlns="http://www.w3.org/2000/svg" width="400" height="280" viewBox="0 0 400 280">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#0e1a0e"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>
  </defs>
  <rect width="400" height="280" fill="url(#bg)"/>
  <rect x="0" y="0" width="400" height="1" fill="#a8d67e" opacity="0.2"/>
  <rect x="0" y="279" width="400" height="1" fill="#a8d67e" opacity="0.2"/>
  <!-- Grid lines -->
  <line x1="0" y1="70" x2="400" y2="70" stroke="#a8d67e" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="140" x2="400" y2="140" stroke="#a8d67e" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="210" x2="400" y2="210" stroke="#a8d67e" stroke-opacity="0.04" stroke-width="1"/>
  <!-- Player silhouette -->
  <ellipse cx="145" cy="168" rx="22" ry="8" fill="#a8d67e" opacity="0.12"/>
  <rect x="132" y="110" width="26" height="55" rx="4" fill="#a8d67e" opacity="0.22"/>
  <circle cx="145" cy="102" r="14" fill="#a8d67e" opacity="0.22"/>
  <!-- Enemy silhouette -->
  <ellipse cx="255" cy="172" rx="26" ry="9" fill="#e05c2a" opacity="0.12"/>
  <rect x="240" y="108" width="30" height="60" rx="4" fill="#e05c2a" opacity="0.22"/>
  <circle cx="255" cy="100" r="16" fill="#e05c2a" opacity="0.22"/>
  <!-- Aura glow -->
  <circle cx="145" cy="135" r="36" fill="#a8d67e" opacity="0.04"/>
  <circle cx="255" cy="135" r="42" fill="#e05c2a" opacity="0.04"/>
  <!-- Title text -->
  <text x="200" y="44" text-anchor="middle" fill="#a8d67e" font-family="serif" font-size="22" opacity="0.85" letter-spacing="3">The Progenitors</text>
  <text x="200" y="60" text-anchor="middle" fill="#3a5a4a" font-family="monospace" font-size="8" letter-spacing="4">TURN-BASED RPG</text>
  <!-- Ground line -->
  <line x1="60" y1="176" x2="340" y2="176" stroke="#2a4a2a" stroke-opacity="0.5" stroke-width="1"/>
  <!-- Aura chips -->
  <rect x="80" y="220" width="50" height="18" rx="9" fill="#e05c2a" opacity="0.2"/>
  <text x="105" y="233" text-anchor="middle" fill="#e05c2a" font-family="monospace" font-size="8" opacity="0.7">FLAME</text>
  <rect x="175" y="220" width="50" height="18" rx="9" fill="#4ab5e8" opacity="0.2"/>
  <text x="200" y="233" text-anchor="middle" fill="#4ab5e8" font-family="monospace" font-size="8" opacity="0.7">PHOTON</text>
  <rect x="270" y="220" width="60" height="18" rx="9" fill="#8a7a5a" opacity="0.2"/>
  <text x="300" y="233" text-anchor="middle" fill="#8a7a5a" font-family="monospace" font-size="8" opacity="0.7">MINERAL</text>
  <!-- HP bar mock -->
  <rect x="80" y="252" width="240" height="6" rx="3" fill="#1a2a1a"/>
  <rect x="80" y="252" width="160" height="6" rx="3" fill="#a8d67e" opacity="0.4"/>
  <rect x="80" y="262" width="240" height="4" rx="2" fill="#1a2a3a"/>
  <rect x="80" y="262" width="100" height="4" rx="2" fill="#4ab5e8" opacity="0.35"/>
</svg>
